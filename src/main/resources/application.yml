spring:
  application:
    name: leaf-ai-agent
  profiles:
    active: local

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi ??????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.seeleaf.leafaiagent.controller
# knife4j配置
knife4j:
  # 增强配置
  enable: true
  setting:
    language: zh_cn
